# ===============================
# SERVER CONFIG
# ===============================
server.port=8080
app.base-url=http://localhost:8080/

cache.max.size=100

# ===============================
# DATASOURCE CONFIG (MySQL)
# ===============================

#For docker use we need to add
#If you are using docker to run then you need to change the datasource url to point to the mysql container instead of localhost.
#i.e; line num : 19 comment it and line 16 uncomment
#spring.datasource.url=jdbc:mysql://mysql:3306/tinyurl_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# For MySQL in Localhost to run the application:
spring.datasource.url=jdbc:mysql://localhost:3306/tinyurl_db

spring.datasource.username={ADD-YOUR-USERNAME}
spring.datasource.password={ADD-YOUR-PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIG
## ===============================
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.properties.hibernate.format_sql=true